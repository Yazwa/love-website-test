<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<title>For You ❤️</title>

<style>

/* 🌈 Background */
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ff758c, #ff7eb3, #fad0c4);
  overflow: hidden;
}

/* 💎 Card */
.container {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 90%;
  max-width: 380px;
  padding: 25px;
  border-radius: 25px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(25px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.25);
  text-align: center;
}

.active { display: flex; }

h1,h2 { color:white; }
h2 {
  font-family: 'Great Vibes', cursive;
  font-size: 34px;
}

/* Buttons */
button {
  margin-top: 15px;
  padding: 12px 25px;
  border-radius: 25px;
  border: none;
  cursor: pointer;
  color:white;
  background: linear-gradient(135deg,#ff4d6d,#ff758c);
  transition: 0.3s;
}
button:hover { transform: scale(1.05); }

/* Input */
input {
  width: 100%;
  padding: 14px;
  border-radius: 25px;
  border: none;
  text-align: center;
}

/* ❤️ FLOATING HEARTS */
#hearts span {
  position: absolute;
  font-size: 18px;
  animation: floatUp linear infinite;
  opacity: 0.7;
  pointer-events: none;
}

@keyframes floatUp {
  0% { transform: translateY(100vh) scale(0.8); opacity: 0; }
  20% { opacity: 1; }
  100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
}

/* 😜 NO button */
.btn-area { position: relative; height:120px; width:100%; }
#noBtn {
  position:absolute;
  left:60%;
  top:50%;
}

/* 💬 Chat */
.chat-box {
  width:100%;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.msg {
  max-width:75%;
  padding:10px;
  border-radius:15px;
}
.left {
  background:rgba(255,255,255,0.25);
  align-self:flex-start;
}
.right {
  background:#ff4d6d;
  align-self:flex-end;
}

/* 📸 Gallery */
.gallery img {
  width:100%;
  border-radius:15px;
}
.dots span {
  height:8px;
  width:8px;
  background:white;
  display:inline-block;
  border-radius:50%;
  opacity:0.4;
}
.active-dot { opacity:1; }

/* 💌 */
#feelText { font-size:18px; }

/* 💍 */
#countdown { font-size:24px; }

/* 🎁 */
.final-yes {
  background:linear-gradient(135deg,#00c9a7,#00e4d0);
}

</style>
</head>

<body>

<div id="hearts"></div>

<!-- LOGIN -->
<div id="login" class="container active">
  <h2>What do I call you? 💕</h2>
  <input type="password" id="pass">
  <button onclick="login()">Enter 💖</button>
</div>

<!-- VALENTINE -->
<div id="page1" class="container">
  <h2 id="typing"></h2>
  <div class="btn-area">
    <button onclick="showPage('page2')">Yes 💖</button>
    <button id="noBtn">No 😜</button>
  </div>
</div>

<!-- CHAT -->
<div id="page2" class="container">
  <h2>Our Chats 💬</h2>
  <div class="chat-box">
    <div class="msg left">Did you eat?</div>
    <div class="msg right">Only if you eat too ❤️</div>
    <div class="msg left">I miss you</div>
    <div class="msg right">I miss you more 🥺</div>
  </div>
  <button onclick="showPage('page3')">Next ➡️</button>
</div>

<!-- GALLERY -->
<div id="page3" class="container">
  <h2>Our Memories 📸</h2>
  <img id="img" src="https://via.placeholder.com/300">
  <div id="dots"></div>
  <button onclick="nextImg()">Next ➡️</button>
</div>

<!-- SONG -->
<div id="page4" class="container">
  <h2>This reminds me of you 🎶</h2>
  <iframe width="100%" height="180"
    src="https://www.youtube.com/embed/2Vv-BfVoq4g"></iframe>
  <button onclick="showPage('page5')">Next ➡️</button>
</div>

<!-- FEELINGS -->
<div id="page5" class="container">
  <h2 id="feelText"></h2>
  <button onclick="showPage('page6')">Next ➡️</button>
</div>

<!-- COUNTDOWN -->
<div id="page6" class="container">
  <h2>Forever starts in 💍</h2>
  <h1 id="countdown"></h1>
  <button onclick="showPage('page7')">Final 🎁</button>
</div>

<!-- FINAL -->
<div id="page7" class="container">
  <h1>I choose you ❤️</h1>
  <button class="final-yes" onclick="explode()">YES FOREVER 💍</button>
</div>

<script>

/* LOGIN */
function login(){
 if(pass.value==="love"){
  showPage('page1');
  type();
 }
}

/* NAV */
function showPage(id){
 document.querySelectorAll('.container').forEach(p=>p.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}

/* TYPE */
let t="Will you be my Valentine? ❤️", i=0;
function type(){
 if(i<t.length){
  typing.innerHTML+=t[i++];
  setTimeout(type,40);
 }
}

/* NO RUN */
noBtn.onmouseenter=noBtn.ontouchstart=()=>{
 noBtn.style.left=Math.random()*80+"%";
 noBtn.style.top=Math.random()*80+"%";
};

/* GALLERY FIXED */
let images=[
 "https://via.placeholder.com/300",
 "https://via.placeholder.com/301",
 "https://via.placeholder.com/302"
];
let gi=0;

function loadDots(){
 dots.innerHTML="";
 images.forEach((_,i)=>{
  let d=document.createElement("span");
  if(i===gi) d.classList.add("active-dot");
  dots.appendChild(d);
 });
}

function nextImg(){
 if(gi < images.length - 1){
   gi++;
   img.src = images[gi];
   loadDots();
 } else {
   showPage('page4'); // ✅ FIX: auto move
 }
}

img.src = images[0];
loadDots();

/* FEELINGS */
let lines=["You are my peace ❤️","You are my home 🌸","Forever isn’t enough 💕"];
let li=0,ci=0;
function feel(){
 if(li<lines.length){
  if(ci<lines[li].length){
   feelText.innerHTML+=lines[li][ci++];
   setTimeout(feel,40);
  } else {
   feelText.innerHTML+="<br>";
   li++;ci=0;
   setTimeout(feel,500);
  }
 }
}
setTimeout(feel,1500);

/* COUNTDOWN */
let target=new Date("2026-05-01").getTime();
setInterval(()=>{
 let d=target-Date.now();
 let days=Math.floor(d/(1000*60*60*24));
 let h=Math.floor((d%(1000*60*60*24))/(1000*60*60));
 let m=Math.floor((d%(1000*60*60))/(1000*60));
 let s=Math.floor((d%(1000*60))/1000);
 countdown.innerHTML=`${days}d ${h}h ${m}m ${s}s`;
},1000);

/* ❤️ HEARTS */
const heartsArr=['❤️','💖','💕','💘','💗'];
setInterval(()=>{
 const heart=document.createElement('span');
 heart.innerHTML=heartsArr[Math.floor(Math.random()*heartsArr.length)];
 heart.style.left=Math.random()*100+'%';
 heart.style.animationDuration=(4+Math.random()*3)+'s';
 document.getElementById('hearts').appendChild(heart);
 setTimeout(()=>heart.remove(),6000);
},300);

/* 🎁 FINAL */
function explode(){
 for(let i=0;i<80;i++){
  let h=document.createElement("span");
  h.innerHTML="❤️";
  h.style.left=Math.random()*100+"%";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),4000);
 }
}

</script>

</body>
</html>
