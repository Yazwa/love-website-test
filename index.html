<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  background: linear-gradient(to right, #ff9a9e, #fad0c4);
  color: #fff;
  overflow: hidden;
}

.container {
  display: none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.active { display: flex; }

button {
  padding: 15px 25px;
  margin: 10px;
  border: none;
  border-radius: 25px;
  font-size: 18px;
  cursor: pointer;
}

.yes { background-color: #ff4d6d; color: white; }
.no { background-color: #999; color: white; position: absolute; }

img {
  max-width: 300px;
  border-radius: 20px;
  margin: 10px;
}

#hearts span {
  position: absolute;
  color: red;
  animation: float 5s linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh); opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}
</style>

</head>

<body>

<!-- 🎶 Background Music -->

<audio id="bgMusic" loop preload="auto">
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<div id="hearts"></div>

<!-- 🔐 Login Page -->

<div id="login" class="container active">
  <h2>What do I call you? 💕</h2>
  <input type="password" id="pass" placeholder="Type your special name">
  <button onclick="checkPass()">Reveal the magic 💖</button>
</div>

<!-- 💖 Main Pages -->

<div id="page1" class="container">
  <h1 id="typing"></h1>
  <button class="yes" onclick="showPage('page2')">Yes 💖</button>
  <button class="no" onmouseover="moveNo()">No 😜</button>
</div>

<div id="page2" class="container">
  <h1>You made me the happiest ❤️</h1>
  <button onclick="showPage('page3')">Next ➡️</button>
</div>

<div id="page3" class="container">
  <h2>These songs remind me of you 🎶</h2>
  <iframe width="300" height="170"
    src="https://www.youtube.com/embed/2Vv-BfVoq4g">
  </iframe>
  <button onclick="showPage('page4')">Next ➡️</button>
</div>

<div id="page4" class="container">
  <h2>Our Memories 📸</h2>
  <img id="gallery" src="https://via.placeholder.com/300">
  <button onclick="nextImage()">Next Photo</button>
  <button onclick="showPage('page5')">Next ➡️</button>
</div>

<div id="page5" class="container">
  <h2>I may not say it always...</h2>
  <p>But you mean everything to me ❤️</p>
  <button onclick="showPage('page6')">Next ➡️</button>
</div>

<div id="page6" class="container">
  <h2>Countdown to our big day 💍</h2>
  <h1 id="countdown"></h1>
  <button onclick="showPage('page7')">Final Surprise 🎁</button>
</div>

<div id="page7" class="container">
  <h1>I Love You ❤️</h1>
  <p>Forever starts with you...</p>
</div>

<script>

// 🔐 Password
const password = "love"; // change this

function checkPass(){
  const val = document.getElementById('pass').value;

  if(val === password){
    document.getElementById('bgMusic').play();

    const loginDiv = document.getElementById('login');
    loginDiv.innerHTML = `
      <h2>Hehe… that’s my girl 😄❤️</h2>
      <p>I love calling you that… it’s my favorite name 💕</p>
      <button onclick="proceed()">Continue ➡️</button>
    `;
  } else {
    alert("Hmm… that doesn’t sound like you 😜 Try again!");
  }
}

// 👉 Move forward
function proceed(){
  showPage('page1');
  typeText();
}

// 👉 Page navigation
function showPage(id){
  document.querySelectorAll('.container').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// 😄 Move NO button
function moveNo(){
  const btn = document.querySelector('.no');
  btn.style.top = Math.random()*window.innerHeight + 'px';
  btn.style.left = Math.random()*window.innerWidth + 'px';
}

// ⌨️ Typing effect
const text = "Will you be my Valentine? ❤️";
let i = 0;

function typeText(){
  if(i < text.length){
    document.getElementById('typing').innerHTML += text.charAt(i);
    i++;
    setTimeout(typeText, 50);
  }
}

// 📸 Gallery
const images = [
  "https://via.placeholder.com/300",
  "https://via.placeholder.com/301",
  "https://via.placeholder.com/302"
];

let index = 0;

function nextImage(){
  index = (index + 1) % images.length;
  document.getElementById('gallery').src = images[index];
}

// ⏳ Countdown
const targetDate = new Date("2026-05-01").getTime(); // change date

setInterval(()=>{
  const now = new Date().getTime();
  const diff = targetDate - now;

  const d = Math.floor(diff/(1000*60*60*24));
  const h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  const m = Math.floor((diff%(1000*60*60))/(1000*60));
  const s = Math.floor((diff%(1000*60))/1000);

  document.getElementById('countdown').innerHTML =
    d + "d " + h + "h " + m + "m " + s + "s";
}, 1000);

// ❤️ Floating hearts
setInterval(()=>{
  const heart = document.createElement('span');
  heart.innerHTML = '❤️';
  heart.style.left = Math.random()*100 + '%';
  heart.style.fontSize = (Math.random()*20 + 10) + 'px';

  document.getElementById('hearts').appendChild(heart);

  setTimeout(()=>heart.remove(), 5000);
}, 300);

</script>

</body>
</html>
