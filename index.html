<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<title>For You ❤️</title>

<style>

/* 🌈 Background */
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #ff758c, #ff7eb3, #fad0c4);
  overflow: hidden;
}

/* 💎 Glass Card */
.container {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 90%;
  max-width: 380px;
  padding: 25px;
  border-radius: 25px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(25px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.25);
  text-align: center;
  animation: fade 0.5s ease;
}

.active { display: flex; }

@keyframes fade {
  from {opacity:0; transform:scale(0.95);}
  to {opacity:1; transform:scale(1);}
}

/* Titles */
h1,h2 { color:white; }
h2 {
  font-family: 'Great Vibes', cursive;
  font-size: 34px;
}

/* Buttons */
button {
  margin-top: 15px;
  padding: 12px 25px;
  border-radius: 25px;
  border: none;
  cursor: pointer;
  color:white;
  background: linear-gradient(135deg,#ff4d6d,#ff758c);
  transition: 0.3s;
}
button:hover { transform: scale(1.05); }

/* Input */
input {
  width: 100%;
  padding: 14px;
  border-radius: 25px;
  border: none;
  text-align: center;
}

/* ❤️ Hearts */
#hearts span {
  position: absolute;
  animation: float 6s linear infinite;
}
@keyframes float {
  from { transform: translateY(100vh); opacity:0;}
  to { transform: translateY(-10vh); opacity:1;}
}

/* 😜 NO button */
.btn-area { position: relative; height:120px; width:100%; }
#noBtn {
  position:absolute;
  left:60%;
  top:50%;
}

/* 💬 Chat UI */
.chat-box {
  width:100%;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.msg {
  max-width:75%;
  padding:10px;
  border-radius:15px;
  font-size:14px;
}
.left {
  background:rgba(255,255,255,0.25);
  align-self:flex-start;
}
.right {
  background:#ff4d6d;
  align-self:flex-end;
}

/* 📸 Gallery */
.gallery {
  position: relative;
  width:100%;
}
.gallery img {
  width:100%;
  border-radius:15px;
  transition:0.4s;
}
.dots {
  margin-top:8px;
}
.dots span {
  height:8px;
  width:8px;
  background:white;
  display:inline-block;
  border-radius:50%;
  opacity:0.4;
}
.dots .active-dot { opacity:1; }

/* 💌 Feelings */
#feelText {
  font-size:18px;
  line-height:1.5;
}

/* 💍 Countdown */
#countdown {
  font-size:24px;
}

/* 🎁 Final */
.final-yes {
  background:linear-gradient(135deg,#00c9a7,#00e4d0);
  box-shadow:0 0 20px rgba(0,255,200,0.7);
}

</style>
</head>

<body>

<div id="hearts"></div>

<!-- LOGIN -->
<div id="login" class="container active">
  <h2>What do I call you? 💕</h2>
  <input type="password" id="pass">
  <button onclick="login()">Enter 💖</button>
</div>

<!-- VALENTINE -->
<div id="page1" class="container">
  <h2 id="typing"></h2>
  <div class="btn-area">
    <button onclick="showPage('page2')">Yes 💖</button>
    <button id="noBtn">No 😜</button>
  </div>
</div>

<!-- CHAT -->
<div id="page2" class="container">
  <h2>Our Chats 💬</h2>
  <div class="chat-box">
    <div class="msg left">Did you eat?</div>
    <div class="msg right">Only if you eat too ❤️</div>
    <div class="msg left">I miss you</div>
    <div class="msg right">I miss you more 🥺</div>
  </div>
  <button onclick="showPage('page3')">Next ➡️</button>
</div>

<!-- GALLERY -->
<div id="page3" class="container">
  <h2>Our Memories 📸</h2>
  <div class="gallery">
    <img id="img">
  </div>
  <div class="dots" id="dots"></div>
  <button onclick="nextImg()">Next ➡️</button>
</div>

<!-- SONG -->
<div id="page4" class="container">
  <h2>This reminds me of you 🎶</h2>
  <iframe width="100%" height="180"
    src="https://www.youtube.com/embed/2Vv-BfVoq4g"></iframe>
  <button onclick="showPage('page5')">Next ➡️</button>
</div>

<!-- FEELINGS -->
<div id="page5" class="container">
  <h2 id="feelText"></h2>
  <button onclick="showPage('page6')">Next ➡️</button>
</div>

<!-- COUNTDOWN -->
<div id="page6" class="container">
  <h2>Forever starts in 💍</h2>
  <h1 id="countdown"></h1>
  <button onclick="showPage('page7')">Final 🎁</button>
</div>

<!-- FINAL -->
<div id="page7" class="container">
  <h1>I choose you ❤️</h1>
  <button class="final-yes" onclick="explode()">YES FOREVER 💍</button>
</div>

<script>

/* LOGIN */
function login(){
 if(pass.value==="love"){
  showPage('page1');
  type();
 }
}

/* NAV */
function showPage(id){
 document.querySelectorAll('.container').forEach(p=>p.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}

/* TYPE */
let t="Will you be my Valentine? ❤️", i=0;
function type(){
 if(i<t.length){
  typing.innerHTML+=t[i++];
  setTimeout(type,40);
 }
}

/* NO RUN */
let speed=1;
noBtn.onmouseenter=noBtn.ontouchstart=()=>{
 noBtn.style.left=Math.random()*80+"%";
 noBtn.style.top=Math.random()*80+"%";
 speed+=0.2;
};

/* GALLERY */
let images=[
 "https://via.placeholder.com/300",
 "https://via.placeholder.com/301",
 "https://via.placeholder.com/302"
];
let gi=0;
function loadDots(){
 dots.innerHTML="";
 images.forEach((_,i)=>{
  let d=document.createElement("span");
  if(i===gi) d.classList.add("active-dot");
  dots.appendChild(d);
 });
}
function nextImg(){
 gi=(gi+1)%images.length;
 img.src=images[gi];
 loadDots();
}
img.src=images[0];
loadDots();

/* FEELINGS */
let lines=["You are my peace ❤️","You are my home 🌸","Forever isn’t enough with you 💕"];
let li=0,ci=0;
function feel(){
 if(li<lines.length){
  if(ci<lines[li].length){
   feelText.innerHTML+=lines[li][ci++];
   setTimeout(feel,40);
  } else {
   feelText.innerHTML+="<br>";
   li++;ci=0;
   setTimeout(feel,500);
  }
 }
}
setTimeout(feel,1500);

/* COUNTDOWN */
let target=new Date("2026-05-01").getTime();
setInterval(()=>{
 let d=target-Date.now();
 let days=Math.floor(d/(1000*60*60*24));
 let h=Math.floor((d%(1000*60*60*24))/(1000*60*60));
 let m=Math.floor((d%(1000*60*60))/(1000*60));
 let s=Math.floor((d%(1000*60))/1000);
 countdown.innerHTML=`${days}d ${h}h ${m}m ${s}s`;
},1000);

/* FINAL EXPLOSION */
function explode(){
 for(let i=0;i<80;i++){
  let h=document.createElement("span");
  h.innerHTML="❤️";
  h.style.left=Math.random()*100+"%";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),4000);
 }
}

</script>

</body>
</html>
