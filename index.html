<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<title>For You ❤️</title>

<style>

/* 🌈 Background */
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #ff758c, #ff7eb3, #fad0c4);
  overflow: hidden;
}

/* 💎 Premium Card */
.container {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  width: 90%;
  max-width: 360px;

  padding: 30px 20px;
  border-radius: 25px;

  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(25px);

  box-shadow: 0 10px 40px rgba(0,0,0,0.25);
  text-align: center;

  animation: fadeIn 0.6s ease;
}

.active {
  display: flex;
}

/* ✨ Animation */
@keyframes fadeIn {
  from {opacity: 0; transform: scale(0.95);}
  to {opacity: 1; transform: scale(1);}
}

/* 💖 Titles */
h1, h2 {
  color: white;
}

h2 {
  font-family: 'Great Vibes', cursive;
  font-size: 36px;
}

/* ✏️ Input */
input {
  width: 100%;
  padding: 14px;
  border-radius: 25px;
  border: none;
  outline: none;
  font-size: 16px;
  text-align: center;
  margin-top: 10px;
}

/* 🚀 Buttons */
button {
  margin-top: 15px;
  padding: 12px 25px;
  border: none;
  border-radius: 25px;
  font-size: 15px;
  cursor: pointer;

  background: linear-gradient(135deg, #ff4d6d, #ff758c);
  color: white;

  box-shadow: 0 8px 25px rgba(255, 77, 109, 0.4);
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* ❌ No Button (mobile safe) */
.no {
  position: relative;
  background: #777;
}

/* 📸 Image */
img {
  width: 100%;
  border-radius: 15px;
  margin-top: 10px;
}

/* 🎵 iframe fix */
iframe {
  border-radius: 12px;
  margin-top: 10px;
}

/* ❤️ Floating hearts */
#hearts span {
  position: absolute;
  font-size: 18px;
  animation: floatUp 6s linear infinite;
  opacity: 0.7;
}

@keyframes floatUp {
  0% { transform: translateY(100vh); opacity: 0; }
  20% { opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

/* 📱 Mobile tweaks */
@media(max-width: 400px){
  h2 { font-size: 30px; }
}

</style>
</head>

<body>

<div id="hearts"></div>

<!-- 🎶 Music -->
<audio id="bgMusic" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<!-- 🔐 Login -->
<div id="login" class="container active">
  <h2>What do I call you? 💕</h2>
  <input type="password" id="pass" placeholder="Your special name">
  <button onclick="checkPass()">Reveal the magic 💖</button>
</div>

<!-- 💖 Pages -->
<div id="page1" class="container">
  <h1 id="typing"></h1>
  <button onclick="showPage('page2')">Yes 💖</button>
  <button class="no" onclick="moveNo()">No 😜</button>
</div>

<div id="page2" class="container">
  <h1>You made me happiest ❤️</h1>
  <button onclick="showPage('page3')">Next ➡️</button>
</div>

<div id="page3" class="container">
  <h2>Songs for you 🎶</h2>
  <iframe width="100%" height="180"
    src="https://www.youtube.com/embed/2Vv-BfVoq4g">
  </iframe>
  <button onclick="showPage('page4')">Next ➡️</button>
</div>

<div id="page4" class="container">
  <h2>Memories 📸</h2>
  <img id="gallery" src="https://via.placeholder.com/300">
  <button onclick="nextImage()">Next Photo</button>
  <button onclick="showPage('page5')">Next ➡️</button>
</div>

<div id="page5" class="container">
  <h2>You mean everything ❤️</h2>
  <button onclick="showPage('page6')">Next ➡️</button>
</div>

<div id="page6" class="container">
  <h2>Countdown 💍</h2>
  <h1 id="countdown"></h1>
  <button onclick="showPage('page7')">Final 🎁</button>
</div>

<div id="page7" class="container">
  <h1>I Love You ❤️</h1>
</div>

<script>

// 🔐 Password
const password = "love";

function checkPass(){
  const val = document.getElementById('pass').value;

  if(val === password){

    // 🔊 play only after interaction (mobile safe)
    document.getElementById('bgMusic').play();

    document.getElementById('login').innerHTML = `
      <h2>Hehe… that’s my girl 😄❤️</h2>
      <p>I love calling you that… it’s my favorite name 💕</p>
      <button onclick="proceed()">Continue ➡️</button>
    `;
  } else {
    alert("Wrong 😜 try again");
  }
}

function proceed(){
  showPage('page1');
  typeText();
}

// 👉 Navigation
function showPage(id){
  document.querySelectorAll('.container').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// 😜 Move NO (mobile friendly)
function moveNo(){
  alert("No is not an option 😜");
}

// ⌨️ Typing
const text = "Will you be my Valentine? ❤️";
let i = 0;

function typeText(){
  if(i < text.length){
    document.getElementById('typing').innerHTML += text.charAt(i);
    i++;
    setTimeout(typeText, 40);
  }
}

// 📸 Gallery
const images = [
  "https://via.placeholder.com/300",
  "https://via.placeholder.com/301",
  "https://via.placeholder.com/302"
];

let index = 0;

function nextImage(){
  index = (index + 1) % images.length;
  document.getElementById('gallery').src = images[index];
}

// ⏳ Countdown
const targetDate = new Date("2026-05-01").getTime();

setInterval(()=>{
  const now = new Date().getTime();
  const diff = targetDate - now;

  const d = Math.floor(diff/(1000*60*60*24));
  const h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  const m = Math.floor((diff%(1000*60*60))/(1000*60));
  const s = Math.floor((diff%(1000*60))/1000);

  document.getElementById('countdown').innerHTML =
    d+"d "+h+"h "+m+"m "+s+"s";
},1000);

// ❤️ Hearts
setInterval(()=>{
  const heart = document.createElement('span');
  heart.innerHTML = '❤️';
  heart.style.left = Math.random()*100 + '%';

  document.getElementById('hearts').appendChild(heart);
  setTimeout(()=>heart.remove(),5000);
},300);

</script>

</body>
</html>
