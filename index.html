<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<title>For You ❤️</title>

<style>

/* 🌈 Background */
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #ff758c, #ff7eb3, #fad0c4);
  overflow: hidden;
}

/* 💎 Card */
.container {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 90%;
  max-width: 360px;
  padding: 30px 20px;
  border-radius: 25px;
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(25px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.25);
  text-align: center;
}

.active { display: flex; }

h1, h2 { color: white; }
h2 {
  font-family: 'Great Vibes', cursive;
  font-size: 34px;
}

/* Buttons */
button {
  margin-top: 15px;
  padding: 12px 25px;
  border-radius: 25px;
  border: none;
  cursor: pointer;
  background: linear-gradient(135deg, #ff4d6d, #ff758c);
  color: white;
}

/* Input */
input {
  width: 100%;
  padding: 14px;
  border-radius: 25px;
  border: none;
  text-align: center;
}

/* Valentine Page */
.btn-group {
  position: relative;
  width: 100%;
  height: 120px;
}

.no-btn {
  position: absolute;
  left: 60%;
  top: 50%;
}

/* Chat */
.chat {
  width: 100%;
  text-align: left;
}
.msg {
  background: rgba(255,255,255,0.2);
  padding: 10px;
  border-radius: 10px;
  margin: 5px 0;
}

/* Images */
img {
  width: 100%;
  border-radius: 10px;
}

/* Hearts */
#hearts span {
  position: absolute;
  animation: float 6s linear infinite;
}
@keyframes float {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}

</style>
</head>

<body>

<div id="hearts"></div>

<audio id="bgMusic" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<!-- LOGIN -->
<div id="login" class="container active">
  <h2>What do I call you? 💕</h2>
  <input type="password" id="pass">
  <button onclick="checkPass()">Enter 💖</button>
</div>

<!-- VALENTINE -->
<div id="page1" class="container">
  <h2 id="typing"></h2>
  <div class="btn-group">
    <button onclick="showPage('page2')">Yes 💖</button>
    <button id="noBtn" class="no-btn">No 😜</button>
  </div>
</div>

<!-- CHAT PAGE -->
<div id="page2" class="container">
  <h2>When I felt loved 💬</h2>
  <div class="chat">
    <div class="msg">You: Did you eat?</div>
    <div class="msg">Her: Only if you eat too ❤️</div>
    <div class="msg">You: I miss you</div>
    <div class="msg">Her: I miss you more 🥺</div>
  </div>
  <button onclick="showPage('page3')">Next ➡️</button>
</div>

<!-- PHOTOS -->
<div id="page3" class="container">
  <h2>Our Memories 📸</h2>
  <img id="gallery" src="https://via.placeholder.com/300">
  <button onclick="nextImage()">Next Photo</button>
  <button onclick="showPage('page4')">Next ➡️</button>
</div>

<!-- SONG -->
<div id="page4" class="container">
  <h2>This song is YOU 🎶</h2>
  <iframe width="100%" height="180"
    src="https://www.youtube.com/embed/2Vv-BfVoq4g">
  </iframe>
  <button onclick="showPage('page5')">Next ➡️</button>
</div>

<!-- FEELINGS -->
<div id="page5" class="container">
  <h2 id="feelText"></h2>
  <button onclick="showPage('page6')">Next ➡️</button>
</div>

<!-- COUNTDOWN -->
<div id="page6" class="container">
  <h2>Forever starts in 💍</h2>
  <h1 id="countdown"></h1>
  <button onclick="showPage('page7'); confetti();">Final 🎁</button>
</div>

<!-- FINAL -->
<div id="page7" class="container">
  <h1>I choose you. Always ❤️</h1>
</div>

<script>

/* PASSWORD */
function checkPass(){
  if(document.getElementById('pass').value === "love"){
    document.getElementById('bgMusic').play();
    showPage('page1');
    typeText();
  }
}

/* NAV */
function showPage(id){
  document.querySelectorAll('.container').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* TYPE */
const text = "Will you be my Valentine? ❤️";
let i=0;
function typeText(){
  if(i<text.length){
    document.getElementById('typing').innerHTML += text[i];
    i++;
    setTimeout(typeText,40);
  }
}

/* NO BUTTON MOVE */
const noBtn = document.getElementById("noBtn");
function move(){
  noBtn.style.left = Math.random()*80 + "%";
  noBtn.style.top = Math.random()*80 + "%";
}
noBtn.addEventListener("mouseenter", move);
noBtn.addEventListener("touchstart", move);

/* IMAGES */
const imgs = [
 "https://via.placeholder.com/300",
 "https://via.placeholder.com/301",
 "https://via.placeholder.com/302"
];
let idx=0;
function nextImage(){
 idx=(idx+1)%imgs.length;
 document.getElementById('gallery').src=imgs[idx];
}

/* FEELINGS TYPE */
const lines = [
 "You make me feel safe ❤️",
 "You are my peace 🌸",
 "I love you more every day 💕"
];
let li=0, ci=0;
function typeFeel(){
 if(li<lines.length){
   if(ci<lines[li].length){
     document.getElementById('feelText').innerHTML += lines[li][ci];
     ci++;
     setTimeout(typeFeel,40);
   } else {
     document.getElementById('feelText').innerHTML += "<br>";
     li++; ci=0;
     setTimeout(typeFeel,500);
   }
 }
}
setTimeout(typeFeel,2000);

/* COUNTDOWN */
const target = new Date("2026-05-01").getTime();
setInterval(()=>{
 let now=new Date().getTime();
 let d=Math.floor((target-now)/(1000*60*60*24));
 document.getElementById('countdown').innerHTML=d+" days ❤️";
},1000);

/* CONFETTI */
function confetti(){
 for(let i=0;i<50;i++){
  let heart=document.createElement("span");
  heart.innerHTML="❤️";
  heart.style.left=Math.random()*100+"%";
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),4000);
 }
}

</script>

</body>
</html>
